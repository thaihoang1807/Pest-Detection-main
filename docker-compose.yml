services:
  backend:
    build: ./backend
    container_name: pest_backend
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - YOLO_CONFIG_DIR=/tmp/Ultralytics

  worker:
    build: ./backend
    container_name: pest_worker
    command: celery -A worker.celery_app worker --loglevel=info --pool=solo 
    volumes:
      - ./backend:/app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - YOLO_CONFIG_DIR=/tmp/Ultralytics
    ports:
      - "9100:9100"

  redis:
    image: redis:7-alpine
    container_name: pest_redis
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./backend/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./backend/monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml
    ports:
      - "9090:9090"
  
  alertmanager:
    image: prom/alertmanager
    volumes:
      - ./backend/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
  
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
      
  db:
    image: postgres:15-alpine
    container_name: pest_db
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ĐÂY LÀ ĐOẠN FRONTEND ĐƯỢC CHÈN THÊM VÀO:
  frontend:
    build: ./frontend
    container_name: pest_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

# Đây là chữ volumes tổng nằm ngoài cùng
volumes:
  postgres_data:
  grafana_data: