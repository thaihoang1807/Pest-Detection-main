global:
  smtp_smarthost: "smtp.gmail.com:587"
  smtp_from: "youremail@gmail.com"
  smtp_auth_username: "youremail@gmail.com"
  smtp_auth_password: "yourpassword"
  smtp_require_tls: true

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "email"
  routes:
    - match:
        severity: critical
      receiver: "email"
      repeat_interval: 30m

receivers:
  - name: "email"
    email_configs:
      - to: "youremail@gmail.com"
        headers:
          Subject: '[ALERT] {{ .GroupLabels.alertname }}'
        html: |
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}<br>
          <b>Detail:</b> {{ .Annotations.description }}<br>
          <b>Severity:</b> {{ .Labels.severity }}<br><br>
          {{ end }}