global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "pest_backend"
    scrape_interval: 10s
    static_configs:
      - targets: ["pest_backend:8000"] 

  - job_name: "pest_worker"
    scrape_interval: 10s
    static_configs:
      - targets: ["pest_worker:9100"]